<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Price Tier</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:400,600,700">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  
 <div class = "panel pricing-table">

    <div class="pricing-plan">
     <img src="img/icon1.png" alt="" class="pricing-img">
     <h2 class="pricing-header">Report Kunjungan</h2>
       <ul class="pricing-features">
        <li class="pricing-features-item">100 Reports per month</li>
        <li class="pricing-features-item">Pembuatan Laporan Wajib Dilakukan</li>
        </ul>
      <span class="pricing-price">Free</span> 
      <a href="#" class="pricing-button">Sign Up</a> 
    </div>

     <div class="pricing-plan">
     <img src="img/icon2.png" alt="" class="pricing-img">
     <h2 class="pricing-header">Tapologi Jaringan</h2>
       <ul class="pricing-features">
        <li class="pricing-features-item">Perangkat Jaringan</li>
        <li class="pricing-features-item">Pembentukan suatu network</li>
        </ul>
      <span class="pricing-price">Free</span> 
      <a href="#" class="pricing-button">Sign Up</a> 
    </div>


    <div class="pricing-plan">
     <img src="img/icon3.png" alt="" class="pricing-img">
     <h2 class="pricing-header">App Karyawan</h2>
       <ul class="pricing-features">
        <li class="pricing-features-item">Inputan Karyawan</li>
        <li class="pricing-features-item">Pengelolaan Data Karyawan</li>
        </ul>

      <a href="#" class="pricing-button">Sign Up</a>

  </div>
